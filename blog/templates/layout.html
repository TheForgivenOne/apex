<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Apex Blog{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
               max-width:800px; margin:0 auto; padding:2rem; color:#333; line-height:1.6; }
        h1 { margin-bottom:1rem; }
        a { color:#0070f3; text-decoration:none; }
        a:hover { text-decoration:underline; }
        .btn { display:inline-block; padding:0.5rem 1rem; border:1px solid #ccc; border-radius:6px;
               background:white; color:#333; cursor:pointer; font-size:0.9rem; }
        .btn-primary { background:#0070f3; color:white; border-color:#0070f3; }
        .btn-sm { padding:0.3rem 0.7rem; font-size:0.8rem; }
        .card { background:#f9f9f9; padding:1.5rem; border-radius:8px; margin-bottom:1rem; }
        .meta { color:#888; font-size:0.85rem; margin-bottom:0.5rem; }
        .flash { padding:0.75rem; border-radius:6px; margin-bottom:1rem; }
        .flash-info { background:#d1ecf1; color:#0c5460; }
        .flash-success { background:#d4edda; color:#155724; }
        .flash-error { background:#f8d7da; color:#721c24; }
        .form-field { margin-bottom:1rem; }
        .form-field label { display:block; margin-bottom:0.25rem; font-weight:600; }
        .form-error { color:#e00; font-size:0.85rem; margin-bottom:0.25rem; }
        form input, form textarea, form select { width:100%; padding:0.75rem; border:1px solid #ccc;
               border-radius:6px; font-size:1rem; font-family:inherit; }
        form textarea { min-height:200px; }
        .post-card h2 { margin-bottom:0.25rem; }
        .post-card h2 a { color:#111; }
        .comment { padding:0.5rem 0; border-bottom:1px solid #eee; }
        hr { border:none; border-top:1px solid #eee; margin:1.5rem 0; }
    </style>
</head>
<body>
    <nav style="display:flex;gap:1rem;margin-bottom:2rem;border-bottom:1px solid #eee;padding-bottom:1rem;">
        <a href="/" style="font-weight:bold;color:#111;">Apex Blog</a>
        <span style="flex:1;"></span>
        {% if user %}
            Hi <strong>{{ user.username }}</strong>
            <a href="/dashboard">Dashboard</a>
            <a href="/new">Write</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        {% endif %}
    </nav>
    {{! flashes }}
    <main>{% block content %}{% endblock %}</main>
</body>
</html>
